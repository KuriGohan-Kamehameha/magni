name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Validate Version Consistency
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          app_version="$(grep -E 'versionName = "' app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"

          if [[ -z "${app_version}" ]]; then
            echo "Could not parse app version from app/build.gradle.kts"
            exit 1
          fi

          if [[ "${tag_version}" != "${app_version}" ]]; then
            echo "Tag version (${tag_version}) does not match app version (${app_version})"
            exit 1
          fi

          if ! grep -q "^## \[${app_version}\] - " CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for ${app_version}"
            exit 1
          fi

      - name: Build Debug and Stripped Release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Validate Signing Secrets
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for key in SIGNING_KEY_BASE64 SIGNING_KEY_ALIAS SIGNING_STORE_PASSWORD SIGNING_KEY_PASSWORD; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required release signing secret: ${key}"
              exit 1
            fi
          done

      - name: Sign Release APK
        id: sign
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Prepare Release Assets
        run: |
          set -euo pipefail
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/magni-${GITHUB_REF_NAME}-debug.apk"
          signed_apk="${{ steps.sign.outputs.signedReleaseFile }}"
          if [[ -z "${signed_apk}" || ! -f "${signed_apk}" ]]; then
            echo "Signed release APK was not produced"
            exit 1
          fi
          cp "${signed_apk}" "dist/magni-${GITHUB_REF_NAME}-release.apk"
          sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - name: Extract Release Notes
        run: |
          set -euo pipefail
          app_version="${GITHUB_REF_NAME#v}"
          awk '/^## \['"${app_version}"'\]/{flag=1;next}/^## \[/{if(flag)exit}flag' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "Release notes section for ${app_version} is empty"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@71d29a04ae7c63895f38299d7a5e05d238f7f445 # v2
        with:
          files: |
            dist/magni-${{ github.ref_name }}-debug.apk
            dist/magni-${{ github.ref_name }}-release.apk
            dist/SHA256SUMS.txt
          body_path: /tmp/release-notes.md
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
