<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Magni Home</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: #ffffff;
      --frame: #6a7a90;
      --field: #f7f9fc;
      --ink: #1f2b39;
      --muted: #556477;
      --accent: #ef8b2f;
      --accent-soft: #44ef8b2f;
      --button: #e8edf4;
      --button-border: #5f6f83;
    }

    body[data-theme="dsi"] {
      --bg: #d8dde4;
      --panel: #f7fbff;
      --frame: #6f7f95;
      --field: #edf3fa;
      --ink: #1f2b39;
      --muted: #4c5d72;
      --accent: #3ca95c;
      --accent-soft: #443ca95c;
      --button: #eef2f8;
      --button-border: #65768d;
    }

    body[data-theme="dsi-dark"] {
      --bg: #111a24;
      --panel: #1a2633;
      --frame: #31475d;
      --field: #243447;
      --ink: #e3ecf7;
      --muted: #9eb1c8;
      --accent: #4fc777;
      --accent-soft: #444fc777;
      --button: #243447;
      --button-border: #3d556d;
    }

    body[data-theme="electric"] {
      --bg: #05010d;
      --panel: #110526;
      --frame: #9f40ff;
      --field: #190736;
      --ink: #f5e9ff;
      --muted: #caa6ee;
      --accent: #c000ff;
      --accent-soft: #44c000ff;
      --button: #1d0841;
      --button-border: #ab59ff;
      background-image:
        radial-gradient(circle at 12% 8%, rgba(189, 0, 255, 0.28), transparent 42%),
        radial-gradient(circle at 88% 16%, rgba(123, 16, 255, 0.22), transparent 35%),
        radial-gradient(circle at 45% 82%, rgba(196, 70, 255, 0.22), transparent 40%);
    }

    * {
      box-sizing: border-box;
      font-family: monospace;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      padding: 14px;
    }

    .panel {
      border: 1px solid var(--frame);
      border-radius: 10px;
      background: var(--panel);
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: inset 0 1px 0 #fff;
    }

    body[data-theme="dsi"] .panel {
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 16px,
          rgba(111, 127, 149, 0.08) 16px,
          rgba(111, 127, 149, 0.08) 17px
        );
    }

    body[data-theme="dsi-dark"] .panel {
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 16px,
          rgba(129, 161, 196, 0.14) 16px,
          rgba(129, 161, 196, 0.14) 17px
        );
    }

    body[data-theme="electric"] .panel {
      box-shadow:
        0 0 0 1px rgba(182, 72, 255, 0.4),
        0 0 18px rgba(158, 39, 255, 0.35),
        inset 0 0 24px rgba(101, 25, 179, 0.38);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .search {
      display: flex;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--frame);
      border-radius: 7px;
      font-size: 14px;
      background: var(--field);
      color: var(--ink);
    }

    button {
      border: 1px solid var(--button-border);
      background: var(--button);
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 12px;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .links a {
      display: block;
      text-decoration: none;
      border: 1px solid var(--frame);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      color: var(--ink);
      background: var(--field);
      font-size: 12px;
    }

    .tip {
      color: var(--muted);
      font-size: 11px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 10px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Magni <span class="badge" id="themeBadge">Overview Mode</span></h1>
    <form class="search" id="searchForm">
      <input id="query" placeholder="Type URL or search" />
      <button type="submit">GO</button>
    </form>
    <div class="links">
      <a href="https://news.ycombinator.com">News</a>
      <a href="https://en.wikipedia.org">Wikipedia</a>
      <a href="https://m.youtube.com">YouTube</a>
      <a href="https://reddit.com">Reddit</a>
    </div>
    <p class="tip">Drag the top map to move the highlighted viewport, pinch top to zoom the map only, and pinch bottom (or use +/-) to change browser magnification.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const selectedTheme = params.get('theme');
    const badge = document.getElementById('themeBadge');
    if (selectedTheme === 'dsi') {
      document.body.dataset.theme = 'dsi';
      badge.textContent = 'DSi Classic';
    } else if (selectedTheme === 'dsi-dark') {
      document.body.dataset.theme = 'dsi-dark';
      badge.textContent = 'DSi Classic Dark';
    } else if (selectedTheme === 'electric') {
      document.body.dataset.theme = 'electric';
      badge.textContent = 'Electric Purple';
    }

    const form = document.getElementById('searchForm');
    const query = document.getElementById('query');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const value = query.value.trim();
      if (!value) return;

      const hasProtocol = value.startsWith('http://') || value.startsWith('https://');
      const looksLikeDomain = value.includes('.') && !value.includes(' ');

      if (hasProtocol) {
        location.href = value;
      } else if (looksLikeDomain) {
        location.href = `https://${value}`;
      } else {
        location.href = `https://duckduckgo.com/?q=${encodeURIComponent(value)}`;
      }
    });
  </script>
</body>
</html>
